name: ChatOps

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  chatops:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/chatops') && github.event.comment.user.login == 'kushmanmb'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Parse chatops command
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          echo "comment=$COMMENT" >> $GITHUB_OUTPUT
          
          # Extract command parts
          if [[ "$COMMENT" =~ ^/chatops[[:space:]]+run[[:space:]]+feature[[:space:]]+set[[:space:]]+([a-zA-Z0-9_-]+)$ ]]; then
            FLAG_NAME="${BASH_REMATCH[1]}"
            echo "action=feature_set" >> $GITHUB_OUTPUT
            echo "flag_name=$FLAG_NAME" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/chatops[[:space:]]+run[[:space:]]+feature[[:space:]]+unset[[:space:]]+([a-zA-Z0-9_-]+)$ ]]; then
            FLAG_NAME="${BASH_REMATCH[1]}"
            echo "action=feature_unset" >> $GITHUB_OUTPUT
            echo "flag_name=$FLAG_NAME" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMENT" =~ ^/chatops[[:space:]]+run[[:space:]]+feature[[:space:]]+list$ ]]; then
            echo "action=feature_list" >> $GITHUB_OUTPUT
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "valid=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Execute feature flag command
        if: steps.parse.outputs.valid == 'true'
        id: execute
        run: |
          ACTION="${{ steps.parse.outputs.action }}"
          FLAG_NAME="${{ steps.parse.outputs.flag_name }}"
          
          case "$ACTION" in
            feature_set)
              node -e "const ff = require('./src/feature-flags.js'); ff.setFlag('$FLAG_NAME', true); console.log('✅ Feature flag \`$FLAG_NAME\` has been enabled');" > result.txt
              ;;
            feature_unset)
              node -e "const ff = require('./src/feature-flags.js'); ff.setFlag('$FLAG_NAME', false); console.log('✅ Feature flag \`$FLAG_NAME\` has been disabled');" > result.txt
              ;;
            feature_list)
              node -e "const ff = require('./src/feature-flags.js'); const flags = ff.listFlags(); console.log('📋 Feature Flags:\n' + JSON.stringify(flags, null, 2));" > result.txt
              ;;
          esac
          
          RESULT=$(cat result.txt)
          echo "result<<EOF" >> $GITHUB_OUTPUT
          echo "$RESULT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: Commit feature flag changes
        if: steps.parse.outputs.valid == 'true' && (steps.parse.outputs.action == 'feature_set' || steps.parse.outputs.action == 'feature_unset')
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add feature-flags.json
          git commit -m "ChatOps: Update feature flag ${{ steps.parse.outputs.flag_name }}" || echo "No changes to commit"
          git push
          
      - name: Post success comment
        if: steps.parse.outputs.valid == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const result = `${{ steps.execute.outputs.result }}`;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: result
            });
            
      - name: Post invalid command comment
        if: steps.parse.outputs.valid == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ Invalid chatops command. 
              
Available commands:
- \`/chatops run feature set kushmanmb\` - Enable a feature flag
- \`/chatops run feature unset kushmanmb\` - Disable a feature flag  
- \`/chatops run feature list\` - List all feature flags`
            });
