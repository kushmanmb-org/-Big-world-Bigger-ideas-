<svg width="1024" height="768" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2f3640;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect for blockchain -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Neon glow -->
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background gradient -->
  <rect width="1024" height="768" fill="url(#bgGradient)"/>
  
  <!-- Cyberpunk cityscape silhouettes -->
  <g opacity="0.4">
    <rect x="50" y="500" width="80" height="268" fill="#1a1a2e"/>
    <rect x="150" y="450" width="100" height="318" fill="#1a1a2e"/>
    <rect x="270" y="480" width="90" height="288" fill="#1a1a2e"/>
    <rect x="380" y="420" width="120" height="348" fill="#1a1a2e"/>
    <rect x="520" y="460" width="100" height="308" fill="#1a1a2e"/>
    <rect x="640" y="430" width="110" height="338" fill="#1a1a2e"/>
    <rect x="770" y="490" width="90" height="278" fill="#1a1a2e"/>
    <rect x="880" y="520" width="90" height="248" fill="#1a1a2e"/>
  </g>
  
  <!-- Neon windows on buildings -->
  <g opacity="0.8">
    <rect x="60" y="510" width="15" height="20" fill="#3498db" filter="url(#neonGlow)"/>
    <rect x="85" y="510" width="15" height="20" fill="#3498db" filter="url(#neonGlow)"/>
    <rect x="60" y="545" width="15" height="20" fill="#f1c40f" filter="url(#neonGlow)"/>
    <rect x="85" y="545" width="15" height="20" fill="#3498db" filter="url(#neonGlow)"/>
    
    <rect x="170" y="470" width="20" height="25" fill="#3498db" filter="url(#neonGlow)"/>
    <rect x="200" y="470" width="20" height="25" fill="#f1c40f" filter="url(#neonGlow)"/>
    <rect x="170" y="510" width="20" height="25" fill="#f1c40f" filter="url(#neonGlow)"/>
    <rect x="200" y="510" width="20" height="25" fill="#3498db" filter="url(#neonGlow)"/>
    
    <rect x="285" y="500" width="18" height="22" fill="#3498db" filter="url(#neonGlow)"/>
    <rect x="315" y="500" width="18" height="22" fill="#3498db" filter="url(#neonGlow)"/>
  </g>
  
  <!-- Central blockchain structure - hexagonal tower -->
  <g transform="translate(512, 384)">
    <!-- Base glow -->
    <circle cx="0" cy="50" r="120" fill="#3498db" opacity="0.3" filter="url(#glow)"/>
    
    <!-- Blockchain blocks (hexagons) -->
    <g filter="url(#neonGlow)">
      <!-- Bottom block -->
      <polygon points="-50,60 -25,75 25,75 50,60 25,45 -25,45" fill="none" stroke="#3498db" stroke-width="3"/>
      <polygon points="-45,60 -22,72 22,72 45,60 22,48 -22,48" fill="#2f3640" opacity="0.8"/>
      
      <!-- Middle block -->
      <polygon points="-50,10 -25,25 25,25 50,10 25,-5 -25,-5" fill="none" stroke="#3498db" stroke-width="3"/>
      <polygon points="-45,10 -22,22 22,22 45,10 22,-2 -22,-2" fill="#2f3640" opacity="0.8"/>
      
      <!-- Top block -->
      <polygon points="-50,-40 -25,-25 25,-25 50,-40 25,-55 -25,-55" fill="none" stroke="#f1c40f" stroke-width="3"/>
      <polygon points="-45,-40 -22,-28 22,-28 45,-40 22,-52 -22,-52" fill="#2f3640" opacity="0.8"/>
      
      <!-- Connection lines -->
      <line x1="0" y1="45" x2="0" y2="25" stroke="#3498db" stroke-width="2"/>
      <line x1="0" y1="-5" x2="0" y2="-25" stroke="#3498db" stroke-width="2"/>
    </g>
    
    <!-- Code halo/particles -->
    <g opacity="0.6" font-family="monospace" font-size="12" fill="#3498db">
      <text x="-100" y="-80" filter="url(#neonGlow)">010101</text>
      <text x="70" y="-70" fill="#f1c40f" filter="url(#neonGlow)">0x3F8A</text>
      <text x="-110" y="20" filter="url(#neonGlow)">{hash}</text>
      <text x="75" y="30" fill="#f1c40f" filter="url(#neonGlow)">Block#</text>
      <text x="-95" y="120" fill="#f1c40f" filter="url(#neonGlow)">chain</text>
      <text x="80" y="110" filter="url(#neonGlow)">0x...</text>
    </g>
    
    <!-- Additional code particles -->
    <g opacity="0.4" font-family="monospace" font-size="10" fill="#3498db">
      <text x="-140" y="-30">const</text>
      <text x="110" y="-20" fill="#f1c40f">func()</text>
      <text x="-130" y="80">web3</text>
      <text x="100" y="70" fill="#f1c40f">await</text>
    </g>
    
    <!-- Circular orbits/halo -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#3498db" stroke-width="1" opacity="0.3"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#f1c40f" stroke-width="1" opacity="0.2"/>
  </g>
  
  <!-- Light beams -->
  <g opacity="0.1">
    <polygon points="512,250 480,768 544,768" fill="#3498db"/>
    <polygon points="450,300 430,768 470,768" fill="#f1c40f"/>
    <polygon points="574,300 554,768 594,768" fill="#3498db"/>
  </g>
  
  <!-- BeyondGlobal Title -->
  <g transform="translate(512, 150)">
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#3498db" filter="url(#neonGlow)">BeyondGlobal</text>
    <!-- Shadow/outline for better visibility -->
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="none" stroke="#f1c40f" stroke-width="2"/>
  </g>
  
  <!-- Tagline -->
  <text x="512" y="680" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" fill="#f1c40f" filter="url(#neonGlow)">Empowering a Borderless Future</text>
</svg>
