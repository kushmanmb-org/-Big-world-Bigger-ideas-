[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"

# Optimizer settings
optimizer = true
optimizer_runs = 999999

# EVM version
evm_version = "paris"

# Compilation settings
via_ir = false

# Extra output selection
extra_output = ["evm.bytecode", "evm.deployedBytecode", "devdoc", "userdoc", "metadata", "abi"]
extra_output_files = ["metadata"]

# Metadata settings
bytecode_hash = "ipfs"

# Remappings (dependencies)
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "FreshCryptoLib/=lib/webauthn-sol/lib/FreshCryptoLib/solidity/src/",
    "account-abstraction/=lib/account-abstraction/contracts/",
    "ds-test/=lib/forge-std/lib/ds-test/src/",
    "erc4626-tests/=lib/openzeppelin-contracts/lib/erc4626-tests/",
    "forge-std/=lib/forge-std/src/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "p256-verifier/=lib/p256-verifier/",
    "safe-singleton-deployer-sol/=lib/safe-singleton-deployer-sol/",
    "solady/=lib/solady/src/",
    "webauthn-sol/=lib/webauthn-sol/src/"
]

[profile.default.optimizer_details]
# Optimizer details can be configured here if needed
# Currently using default settings with 999999 runs
