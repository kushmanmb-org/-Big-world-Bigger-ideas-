    <script>
        // Feature Flags Management (Browser-compatible)
        let featureFlags = {
            dark_mode: false,
            new_ui: false
        };

        // Load feature flags from JSON file
        async function loadFeatureFlags() {
            try {
                const response = await fetch('./feature-flags.json');
                if (response.ok) {
                    const data = await response.json();
                    // Extract enabled status from flags
                    for (const [key, value] of Object.entries(data.flags || {})) {
                        featureFlags[key] = value.enabled || false;
                    }
                    console.log('✅ Feature flags loaded:', featureFlags);
                    applyFeatureFlags();
                }
            } catch (error) {
                console.warn('⚠️  Could not load feature flags, using defaults:', error.message);
            }
        }

        // Apply feature flags to the UI
        function applyFeatureFlags() {
            const activeFeatures = [];
            
            // Apply dark mode
            if (featureFlags.dark_mode) {
                document.body.classList.add('dark-mode');
                activeFeatures.push('🌙 Dark Mode');
                console.log('🌙 Dark mode enabled');
            } else {
                document.body.classList.remove('dark-mode');
            }

            // Apply new UI styles if enabled
            if (featureFlags.new_ui) {
                document.body.classList.add('new-ui');
                activeFeatures.push('✨ New UI');
                console.log('✨ New UI enabled');
            }
            
            // Update feature flags indicator
            const indicator = document.getElementById('featureFlagsIndicator');
            const flagsList = document.getElementById('featureFlagsList');
            
            if (activeFeatures.length > 0) {
                indicator.classList.remove('hidden');
                flagsList.textContent = activeFeatures.join(', ');
            } else {
                indicator.classList.add('hidden');
            }
        }

        // Editor functionality
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const templateSelect = document.getElementById('templateSelect');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const copyBtn = document.getElementById('copyBtn');
        const formatBtn = document.getElementById('formatBtn');
        const refreshPreview = document.getElementById('refreshPreview');

        // Templates
        const templates = {
            blockchain: `# Blockchain Network Documentation

## Network Name
**Chain ID:** [Enter Chain ID]  
**Network Type:** [Enter Type]  
**Launch Date:** [Enter Date]

### RPC Endpoints
- \`https://example-rpc.com\`
- \`https://backup-rpc.com\`

### Block Explorers
- [Explorer Name](https://explorer-url.com)

### Network Details
- Native Currency: [Currency Name]
- Block Time: ~X seconds
- Status: Production/Testnet

### Key Features
- Feature 1
- Feature 2
- Feature 3`,
            
            'smart-contract': `// SPDX-License-Identifier: MIT
pragma solidity ^0.8.0;

/**
 * @title Smart Contract Template
 * @author Your Name
 * @notice This is a basic smart contract template
 */

    // State variables
    address public owner;
    uint256 public value;
    
    // Events
    event ValueChanged(uint256 newValue);
    
    // Constructor
    constructor() {
        owner = msg.sender;
    }
    
    // Modifiers
    modifier onlyOwner() {
        require(msg.sender == owner, "Not the owner");
        _;
    }
    
    // Functions
    function setValue(uint256 _value) public onlyOwner {
        value = _value;
        emit ValueChanged(_value);
    }
}`,
            
            readme: `# Project Name

            markdown: `# Markdown Syntax Guide

## Headers

## Emphasis

        // Simple markdown parser
        function parseMarkdown(text) {
            if (!text) return '<p class="text-gray-400 italic">Your preview will appear here as you type...</p>';
            
            let html = text;
            
            // Code blocks (must be processed before inline code)
            html = html.replace(/```(\w+)?\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });
            
            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            
            // Bold
            html = html.replace(/\*\*\*([\s\S]+?)\*\*\*/g, '<strong><em>$1</em></strong>');
            html = html.replace(/\*\*([\s\S]+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([\s\S]+?)__/g, '<strong>$1</strong>');
            
            // Italic
            html = html.replace(/\*([\s\S]+?)\*/g, '<em>$1</em>');
            html = html.replace(/_([\s\S]+?)_/g, '<em>$1</em>');
            
            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Unordered lists - wrap consecutive list items
            html = html.replace(/^\- (.+)$/gim, '<li>$1</li>');
            // Wrap consecutive <li> elements in <ul> tags
            html = html.replace(/(<li>[\s\S]*?<\/li>(?:\s*<li>[\s\S]*?<\/li>)*)/g, '<ul>$1</ul>');
            
            // Blockquotes
            html = html.replace(/^&gt; (.+)$/gim, '<blockquote>$1</blockquote>');
            
            // Horizontal rule
            html = html.replace(/^---$/gim, '<hr class="my-4 border-gray-300">');
            
            // Line breaks
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            
            // Wrap in paragraphs if not already wrapped
            if (!html.startsWith('<')) {
                html = '<p>' + html + '</p>';
            }
            
            return html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Update preview
        function updatePreview() {
            const text = editor.value;
            preview.innerHTML = parseMarkdown(text);
            
            // Update counts
            charCount.textContent = text.length;
            const trimmedText = text.trim();
            if (trimmedText.length === 0) {
                wordCount.textContent = 0;
            } else {
                const words = trimmedText.split(/\s+/).filter(w => w.length > 0);
                wordCount.textContent = words.length;
            }
        }

        // Event listeners
        editor.addEventListener('input', updatePreview);
        refreshPreview.addEventListener('click', updatePreview);

        // Template selection
        templateSelect.addEventListener('change', (e) => {
            const template = e.target.value;
            if (template && templates[template]) {
                editor.value = templates[template];
                updatePreview();
            }
            e.target.value = '';
        });

        // Clear button
        clearBtn.addEventListener('click', () => {
            if (confirm('Are you sure you want to clear the editor?')) {
                editor.value = '';
                updatePreview();
            }
        });

        // Download button
        downloadBtn.addEventListener('click', () => {
            const text = editor.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.md';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Copy to clipboard
        copyBtn.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(editor.value);
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (err) {
                alert('Failed to copy to clipboard');
            }
        });

        // Format button (basic formatting)
        formatBtn.addEventListener('click', () => {
            const text = editor.value;
            // Remove excessive blank lines
            const formatted = text.replace(/\n{3,}/g, '\n\n');
            editor.value = formatted;
            updatePreview();
        });

        // Initialize
        updatePreview();
        
        // Load feature flags on page load
        loadFeatureFlags();
    </script>
</body>
